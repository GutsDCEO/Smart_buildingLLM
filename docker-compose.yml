# ============================================================
# Smart Building AI Assistant — Docker Compose
# ============================================================
# Usage:
#   docker-compose config   → validate syntax
#   docker-compose up -d    → start all services
#   docker-compose down     → stop all services
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # Vector Database — Qdrant
  # ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sb_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # Metadata Database — PostgreSQL
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartbuilding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-smartbuilding_metadata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartbuilding}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Workflow Orchestration — n8n
  # ──────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: sb_n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?Set N8N_BASIC_AUTH_PASSWORD in .env}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-smartbuilding_metadata}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-smartbuilding}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # Local LLM Engine — Ollama
  # ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sb_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # On Mac: Apple Silicon GPU is auto-detected.
    # On Windows/Linux with NVIDIA: uncomment the deploy block below.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

# ──────────────────────────────────────────────────────────
# Named Volumes — Persistent Storage
# ──────────────────────────────────────────────────────────
volumes:
  qdrant_data:
    driver: local
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  ollama_data:
    driver: local
